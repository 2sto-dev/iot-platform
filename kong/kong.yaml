_format_version: "3.0"
_transform: true
plugins:
  - name: prometheus


consumers:
  - username: django-users

jwt_secrets:
  - consumer: django-users
    algorithm: HS256
    key: django                              # trebuie să fie același cu iss din token (tokens.py)
    secret: "{vault://env/kong-jwt-secret}"  # citit din env var KONG_JWT_SECRET (Kong env vault); trebuie să fie identic cu JWT_SECRET din Django

services:
  # ── Auth (fără JWT) ──────────────────────────────────────────────────────────
  - name: django-auth
    url: http://172.16.0.105:8000
    routes:
      - name: django-token
        paths:
          - /api/token
        strip_path: false
      - name: django-token-refresh
        paths:
          - /api/token/refresh
        strip_path: false

  # ── Pre-login + provisioning (AllowAny) ──────────────────────────────────────
  - name: django-public
    url: http://172.16.0.105:8000
    routes:
      - name: django-auth-tenants
        paths:
          - /api/auth/tenants
        strip_path: false
      - name: django-provisioning
        paths:
          - /api/provisioning
        strip_path: false

  # ── Devices ──────────────────────────────────────────────────────────────────
  - name: django-devices
    url: http://172.16.0.105:8000
    routes:
      - name: django-devices-route
        paths:
          - /api/devices
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp

  # ── Rules ────────────────────────────────────────────────────────────────────
  - name: django-rules
    url: http://172.16.0.105:8000
    routes:
      - name: django-rules-route
        paths:
          - /api/v1/rules
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp

  # ── Notifications ─────────────────────────────────────────────────────────────
  - name: django-notifications
    url: http://172.16.0.105:8000
    routes:
      - name: django-notifications-route
        paths:
          - /api/v1/notifications
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp

  # ── Audit log ─────────────────────────────────────────────────────────────────
  - name: django-audit
    url: http://172.16.0.105:8000
    routes:
      - name: django-audit-route
        paths:
          - /api/v1/audit
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp

  # ── API Keys ──────────────────────────────────────────────────────────────────
  - name: django-api-keys
    url: http://172.16.0.105:8000
    routes:
      - name: django-api-keys-route
        paths:
          - /api/v1/api-keys
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp

  # ── OTA ───────────────────────────────────────────────────────────────────────
  - name: django-ota
    url: http://172.16.0.105:8000
    routes:
      - name: django-ota-route
        paths:
          - /api/ota
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp

  # ── OpenAPI docs (fără auth) ───────────────────────────────────────────────────
  - name: django-docs
    url: http://172.16.0.105:8000
    routes:
      - name: django-schema
        paths:
          - /api/schema
        strip_path: false
      - name: django-swagger
        paths:
          - /api/docs
        strip_path: false
      - name: django-redoc
        paths:
          - /api/redoc
        strip_path: false

  # ── Go API (JWT validat de Kong; Go re-decodează pentru tenant_id) ──────────
  # strip_path: false — Go-ul așteaptă URL-uri cu prefix /go (StripPrefix în main.go).
  # Authorization header e propagat by default => Go-ul re-validează JWT cu același secret.
  - name: go-api
    url: http://172.16.0.105:8090
    routes:
      - name: go-api-route
        paths:
          - /go
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
