schema_version: "1.0"
id: esp32_bmp280
name: "ESP32 BMP280"
vendor: espressif
model: ESP32+BMP280
description: "ESP32 cu senzor barometric BMP280 (presiune + temperatură, ±1 hPa)"

protocol: mqtt

identification:
  topic_match:
    - pattern: "tenants/+/devices/+/up/bmp280"
      stream: "bmp280"
      extract:
        tenant_id: "$1"
        device_id: "$2"

parser:
  type: json

capabilities:
  - pressure_sensor
  - temperature_sensor
  - mains_powered
  - wifi

normalized_fields:
  pressure_hpa:
    source: pressure
    unit: hPa
    decimals: 2
  temperature_c:
    source: temp
    unit: C
    decimals: 2

telemetry_streams:
  bmp280:
    interval_hint: 30s
    offline_after: 3min
