name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  django-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django-bakend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: django-bakend/requirements-dev.txt
      - name: Install system deps for mysqlclient
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config
      - run: pip install -r requirements-dev.txt
      - run: pytest

  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-iot-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go-iot-platform/go.sum
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...
